name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o cliplink-darwin-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: cliplink-darwin-arm64

  build-macos-amd64:
    name: Build (macOS amd64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o cliplink-darwin-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: cliplink-darwin-amd64

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o cliplink-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: cliplink-windows-amd64.exe

  release:
    name: Release
    needs: [build-macos-arm64, build-macos-amd64, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cliplink-darwin-arm64
            cliplink-darwin-amd64
            cliplink-windows-amd64.exe
          generate_release_notes: true
