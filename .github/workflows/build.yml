name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build arm64
        run: go build -ldflags="-s -w" -o cliplink-darwin-arm64 .

      - name: Build amd64 (cross-compile via clang)
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-target x86_64-apple-macos10.13"
          CGO_LDFLAGS: "-target x86_64-apple-macos10.13"
        run: go build -ldflags="-s -w" -o cliplink-darwin-amd64 .

      - name: Create universal binary
        run: lipo -create -output cliplink-darwin-universal cliplink-darwin-arm64 cliplink-darwin-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            cliplink-darwin-arm64
            cliplink-darwin-amd64
            cliplink-darwin-universal

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o cliplink-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: cliplink-windows-amd64.exe

  release:
    name: Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cliplink-darwin-arm64
            cliplink-darwin-amd64
            cliplink-darwin-universal
            cliplink-windows-amd64.exe
          generate_release_notes: true
